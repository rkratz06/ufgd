<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css"/>
<title>List</title>
</head>

<body class="list-page">

        <nav class="navbar">
            <div>
                <a href="/"><img src="logo.png" href="/"></a>
            </div>
            <div class="nav-links">
                <a href="/list.html">List</a>
                <a href="/leaderboard.html">Leaderboard</a>
                <a href="/levels.html">Levels</a>
                <a href="/FAQ.html">FAQ</a>
            </div>
        </nav>

<div class="list-container">

    <div id="list-panel"></div>

    <div id="detail-panel">
        <div class="placeholder">
            Click a level to view details
        </div>
    </div>

</div>

<script>

let levelsCache = [];

/* =========================
   LOAD LEVELS
========================= */
async function loadLevels() {

    try {

        const res =
            await fetch("/levels?limit=100");

        levelsCache =
            await res.json();

        const listPanel =
            document.getElementById("list-panel");

        listPanel.innerHTML = "";

        levelsCache.forEach(level => {

            const div =
                document.createElement("div");

            div.className = "list-item";

            div.innerText =
                `${level.position}. ${level.name}`;

            div.onclick =
                () => showDetails(
                    level.position,
                    div
                );

            listPanel.appendChild(div);
        });

    } catch (error) {

        console.error(error);
    }
}

/* =========================
   SHOW DETAILS
========================= */
async function showDetails(
    position,
    element
) {

    try {

        // active highlight
        document
            .querySelectorAll(".list-item")
            .forEach(el =>
                el.classList.remove("active")
            );

        element.classList.add("active");

        // fetch full level info
        const res =
            await fetch(`/levels/${position}`);

        const level =
            await res.json();

        const panel =
            document.getElementById(
                "detail-panel"
            );

        panel.innerHTML = `
            <div class="title">
                ${level.name}
            </div>

            <div class="sub">
                Position: ${level.position}
                <br>

                Points:
                ${level.points.toFixed(2)}
            </div>

            <div class="box">
                <strong>Victors</strong>
                <br><br>

                ${
                    level.victors.length
                    ? level.victors.join(", ")
                    : "None yet"
                }
            </div>

            <div class="box">
                <strong>Future Info Section</strong>
                <br>

                Add records, dates,
                videos, creators, etc.
            </div>
        `;

    } catch (error) {

        console.error(error);
    }
}

/* =========================
   INIT
========================= */

loadLevels();

</script>

</body>
</html>
